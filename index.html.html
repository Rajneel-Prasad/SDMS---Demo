<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDMS Web App</title>
<style>
:root{--ink:#17202a;--muted:#64748b;--line:#d7dde5;--bg:#f4f6f8;--panel:#fff;--nav:#132238;--teal:#0f766e;--teal2:#19a598;--blue:#2563eb;--green:#15803d;--amber:#b45309;--red:#b91c1c;--violet:#6d28d9}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}h1,h2,h3,p{margin:0}.app{display:grid;grid-template-columns:270px minmax(0,1fr);min-height:100vh}.side{background:var(--nav);color:white;padding:22px 18px;display:flex;flex-direction:column;gap:22px}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:8px;background:var(--teal2);display:grid;place-items:center;font-weight:700}.brand p{color:#cbd5e1;font-size:13px;margin-top:3px}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#dce7f3;text-align:left;border-radius:8px;padding:11px 12px;display:flex;justify-content:space-between;align-items:center}.nav button.active,.nav button:hover{background:rgba(255,255,255,.12);color:white}.sidebox{margin-top:auto;border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:16px;color:#dce7f3}.sidebox strong{display:block;color:white;font-size:34px;margin:4px 0}.main{padding:24px;display:grid;gap:18px;align-content:start}.top{display:flex;justify-content:space-between;gap:16px;align-items:center}.eyebrow{color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:700}.top h2{font-size:28px;margin-top:4px}.primary,.secondary,.small{border-radius:8px;border:1px solid var(--line);min-height:38px;padding:0 13px}.primary{background:var(--teal);border-color:var(--teal);color:white;font-weight:700}.secondary,.small{background:white;color:var(--ink)}.small{min-height:32px}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric,.panel,.module-card{background:white;border:1px solid var(--line);border-radius:8px;box-shadow:0 12px 32px rgba(16,24,40,.07)}.metric{padding:18px;display:grid;gap:6px}.metric span{color:var(--muted);font-size:13px}.metric strong{font-size:24px}.layout{display:grid;grid-template-columns:minmax(0,1fr)360px;gap:16px;align-items:start}.workspace{display:grid;gap:16px}.panel{padding:18px}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.subhead{color:var(--muted);font-size:13px;margin-top:4px}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.module-card{padding:15px;display:grid;gap:10px}.module-card b{font-size:15px}.module-card span{color:var(--muted);font-size:13px;line-height:1.35}.order{border:1px solid var(--line);border-radius:8px;padding:14px;background:white;display:grid;grid-template-columns:minmax(0,1fr)auto;gap:12px;margin-top:10px}.order.active{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.13)}.title{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.meta{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-size:13px;margin-top:7px}.pill{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:0 10px;font-size:12px;font-weight:700;background:#eef2f7;color:#344256}.blue{background:#dbeafe;color:var(--blue)}.green{background:#dcfce7;color:var(--green)}.amber{background:#fef3c7;color:var(--amber)}.red{background:#fee2e2;color:var(--red)}.violet{background:#ede9fe;color:var(--violet)}.actions{display:grid;gap:8px;min-width:150px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:grid;gap:6px;color:var(--muted);font-size:13px;font-weight:700}input,select,textarea{border:1px solid var(--line);border-radius:8px;padding:10px;background:white;color:var(--ink);min-width:0}textarea{min-height:84px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:11px 8px;text-align:left;vertical-align:middle}.table th{font-size:12px;color:var(--muted);text-transform:uppercase}.checklist{display:grid;gap:8px}.check{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:8px;padding:10px;background:#f8fafc}.box{width:20px;height:20px;border-radius:4px;border:2px solid var(--teal);display:grid;place-items:center;color:var(--teal);font-weight:700;flex:0 0 auto}.route-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}.map{height:210px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(135deg,rgba(15,118,110,.08),rgba(37,99,235,.08)),repeating-linear-gradient(45deg,#f8fafc 0 16px,#e5e7eb 16px 17px);position:relative;overflow:hidden}.map:before{content:"";position:absolute;left:38px;right:45px;top:104px;border-top:5px solid var(--teal);transform:skew(-14deg)}.pin{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--teal);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.2)}.pin.a{left:34px;top:96px}.pin.b{right:38px;top:96px;background:var(--blue)}.timeline{display:grid;gap:10px}.event{display:grid;grid-template-columns:26px 1fr;gap:10px}.dot{width:18px;height:18px;border-radius:50%;background:var(--teal);margin-top:2px}.detail{border-bottom:1px solid var(--line);padding:10px 0;display:grid;gap:4px}.detail span{color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:700}.driver-screen{max-width:420px;border:1px solid var(--line);border-radius:18px;padding:16px;background:#0f172a;color:white}.driver-screen .module-card{background:#16233a;border-color:#263750;color:white;box-shadow:none}.driver-screen .module-card span{color:#cbd5e1}.signature{height:86px;border:2px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:var(--muted);font-style:italic}.bar{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden}.bar i{display:block;height:100%;background:var(--teal)}@media(max-width:1100px){.app{grid-template-columns:1fr}.side{padding:16px}.nav{grid-template-columns:repeat(3,1fr)}.sidebox{display:none}.layout{grid-template-columns:1fr}.route-grid{grid-template-columns:1fr}}@media(max-width:760px){.main{padding:14px}.top,.order{display:flex;flex-direction:column;align-items:stretch}.metrics,.cards,.form-grid,.nav{grid-template-columns:1fr}.actions{min-width:0}}
</style></head>
<body>
<div class="app"><aside class="side"><div class="brand"><div class="logo">SD</div><div><h1>SDMS</h1><p>Smart Delivery Management</p></div></div><nav class="nav" id="nav"></nav><div class="sidebox"><span>Live Workflow</span><strong id="activeCount">0</strong><span>orders in motion</span></div></aside><main class="main"><header class="top"><div><p class="eyebrow">Retail Operations Platform</p><h2 id="pageTitle"></h2><p class="subhead" id="pageSub"></p></div><div><button class="secondary" id="resetBtn">Reset</button> <button class="primary" id="newBtn">+ New Order</button></div></header><section class="metrics"><div class="metric"><span>Today</span><strong id="mTotal"></strong></div><div class="metric"><span>On-time Rate</span><strong id="mOnTime"></strong></div><div class="metric"><span>Active Orders</span><strong id="mActive"></strong></div><div class="metric"><span>Customer Rating</span><strong id="mRating"></strong></div></section><section class="layout"><div class="workspace" id="workspace"></div><aside class="panel"><div class="head"><h3>Selected Delivery</h3><button class="small" id="notifyBtn">Notify</button></div><div class="map"><i class="pin a"></i><i class="pin b"></i></div><div id="details"></div></aside></section></main></div>
<script>
const roles = {
  management: ['Management Dashboard','Real-time KPIs, productivity, delays, and management reporting.'],
  sales: ['Sales Module','Create delivery orders, check stock, verify account status, and schedule delivery.'],
  warehouse: ['Warehouse Module','Electronic picking lists, order preparation, and ready-for-dispatch confirmation.'],
  dispatch: ['Dispatch Module','Route recommendations, vehicle allocation, driver assignment, and disruption control.'],
  driver: ['Driver Module','Mobile delivery schedule, navigation, status updates, issue reporting, and proof of delivery.'],
  customer: ['Customer Module','Delivery tracking, notifications, change requests, ETA updates, and digital sign-off.']
};
const seed = [
  {id:'DO-1048',customer:'Pacific Home Supplies',area:'Suva',items:'Furniture sets, cartons x 18',status:'Scheduled',stock:'Available',account:'Clear',driver:'Anil Kumar',vehicle:'Truck 07',eta:'10:40 AM',route:'Warehouse > Samabula > Suva CBD',rating:4.8,onTime:true,issue:'',signature:'Pending',value:4200,priority:'Standard'},
  {id:'DO-1049',customer:'Island Retail Mart',area:'Nausori',items:'Appliances, pallets x 2',status:'Ready',stock:'Available',account:'Clear',driver:'Unassigned',vehicle:'Recommended: Truck 03',eta:'Pending dispatch',route:'Recommended: Warehouse > Kings Road > Nausori',rating:4.5,onTime:true,issue:'',signature:'Pending',value:6100,priority:'High'},
  {id:'DO-1050',customer:'Lami Traders',area:'Lami',items:'Building materials, bundles x 9',status:'In Transit',stock:'Available',account:'Clear',driver:'Mere Tora',vehicle:'Truck 04',eta:'Delayed to 1:20 PM',route:'Warehouse > Queens Road > Lami',rating:4.2,onTime:false,issue:'Roadworks reported near Walu Bay',signature:'Pending',value:3500,priority:'Urgent'},
  {id:'DO-1051',customer:'Nasinu Mini Market',area:'Nasinu',items:'Grocery stock, cartons x 26',status:'Picking',stock:'Partial',account:'Review',driver:'Unassigned',vehicle:'Pending',eta:'Awaiting warehouse',route:'Pending',rating:4.6,onTime:true,issue:'Partial stock requires customer confirmation',signature:'Pending',value:1900,priority:'Standard'}
];
const flow = ['Order Approved','Picking','Ready','Scheduled','In Transit','Delivered'];
let activeRole = 'management';
let selectedId = 'DO-1048';
let orders = seed.map(order => ({...order}));
const $ = id => document.getElementById(id);
function current(){ return orders.find(order => order.id === selectedId) || orders[0]; }
function badge(status){ if(status === 'Delivered') return 'green'; if(status === 'Scheduled' || status === 'In Transit') return 'blue'; if(status === 'Ready' || status === 'Picking') return 'amber'; return ''; }
function onTimeRate(){ return Math.round(orders.filter(order => order.onTime).length / orders.length * 100); }
function ratingAvg(){ return (orders.reduce((sum, order) => sum + order.rating, 0) / orders.length).toFixed(1); }
function selectOrder(id){ selectedId = id; render(); }
function setRole(role){ activeRole = role; render(); }
function nextStatus(status){ return flow[Math.min(flow.indexOf(status) + 1, flow.length - 1)]; }
function move(id){ orders = orders.map(order => { if(order.id !== id) return order; const status = nextStatus(order.status); const updated = {...order, status}; if(status === 'Ready') updated.eta = 'Pending dispatch'; if(status === 'Scheduled'){ updated.driver = updated.driver === 'Unassigned' ? 'Ravi Singh' : updated.driver; updated.vehicle = updated.vehicle.startsWith('Recommended') ? 'Truck 03' : updated.vehicle; updated.eta = updated.area === 'Nausori' ? '2:10 PM' : '11:45 AM'; } if(status === 'In Transit' && updated.eta === 'Pending dispatch') updated.eta = '12:15 PM'; if(status === 'Delivered'){ updated.signature = 'Captured'; updated.issue = ''; updated.eta = 'Completed'; } return updated; }); render(); }
function delay(id){ orders = orders.map(order => order.id === id ? {...order, onTime:false, issue:'Driver reported delay. Dispatch review required.', eta:'Revised ETA pending'} : order); render(); }
function notifyCustomer(){ const order = current(); orders = orders.map(item => item.id === order.id ? {...item, issue:item.issue || 'Customer notification sent with latest ETA.'} : item); render(); }
function resetData(){ orders = seed.map(order => ({...order})); activeRole = 'management'; selectedId = orders[0].id; render(); }
function quickOrder(){ const id = 'DO-' + (1052 + orders.length); orders.unshift({id, customer:'New Customer Ltd', area:'Suva', items:'Household goods, cartons x 12', status:'Order Approved', stock:'Available', account:'Clear', driver:'Unassigned', vehicle:'Pending', eta:'To be scheduled', route:'Pending route for Suva', rating:4.7, onTime:true, issue:'', signature:'Pending', value:2800, priority:'Standard'}); selectedId = id; activeRole = 'sales'; render(); }
function actionButton(label, onClick){ return '<button class="small" data-action="' + onClick + '">' + label + '</button>'; }
function orderCard(order, actions = true){ const actionHtml = actions ? '<div class="actions"><button class="small" data-move="' + order.id + '">Move forward</button><button class="small" data-delay="' + order.id + '">Report delay</button></div>' : ''; return '<article class="order ' + (order.id === selectedId ? 'active' : '') + '" data-select="' + order.id + '"><div><div class="title"><strong>' + order.id + ' · ' + order.customer + '</strong><span class="pill ' + badge(order.status) + '">' + order.status + '</span><span class="pill violet">' + order.priority + '</span></div><div class="meta"><span>' + order.area + '</span><span>' + order.items + '</span><span>ETA: ' + order.eta + '</span></div></div>' + actionHtml + '</article>'; }
function managementView(){ const delayed = orders.filter(order => !order.onTime).length; const ready = orders.filter(order => order.status === 'Ready').length; const revenue = orders.reduce((sum, order) => sum + order.value, 0); return '<section class="panel"><div class="head"><div><h3>Executive KPI Summary</h3><p class="subhead">Consolidated performance from all operational modules.</p></div><span class="pill blue">Live</span></div><div class="cards"><div class="module-card"><b>Order Turnaround</b><strong>5.4 hrs</strong><span>Average time from approved order to delivery completion.</span><div class="bar"><i style="width:72%"></i></div></div><div class="module-card"><b>Delayed Deliveries</b><strong>' + delayed + '</strong><span>Orders needing dispatch attention.</span><div class="bar"><i style="width:25%"></i></div></div><div class="module-card"><b>Delivery Value</b><strong>$' + revenue.toLocaleString() + '</strong><span>Total value of todays delivery pipeline.</span><div class="bar"><i style="width:84%"></i></div></div></div></section><section class="panel"><div class="head"><h3>Management Report</h3><span>' + ready + ' orders ready for dispatch</span></div><table class="table"><thead><tr><th>KPI</th><th>Current</th><th>Target</th><th>Status</th></tr></thead><tbody><tr><td>On-time delivery rate</td><td>' + onTimeRate() + '%</td><td>90%</td><td><span class="pill amber">Monitor</span></td></tr><tr><td>Customer satisfaction</td><td>' + ratingAvg() + '/5</td><td>4.5/5</td><td><span class="pill green">Good</span></td></tr><tr><td>Driver utilization</td><td>78%</td><td>80%</td><td><span class="pill amber">Close</span></td></tr></tbody></table></section><section class="panel"><div class="head"><h3>Delivery Pipeline</h3><span>' + orders.length + ' records</span></div>' + orders.map(order => orderCard(order, true)).join('') + '</section>'; }
function salesView(){ return '<section class="panel"><div class="head"><div><h3>Create Delivery Order</h3><p class="subhead">Sales can confirm stock, account status, and customer delivery preferences.</p></div><button class="primary" id="sampleOrderBtn">Create Sample</button></div><div class="form-grid"><label>Customer<input value="New Customer Ltd"></label><label>Account Status<select><option>Clear</option><option>Review Required</option></select></label><label>Stock Check<select><option>Available</option><option>Partial Stock</option><option>Out of Stock</option></select></label><label>Preferred Area<select><option>Suva</option><option>Nausori</option><option>Lami</option><option>Nasinu</option></select></label><label style="grid-column:1/-1">Order Items<textarea>Household goods, cartons x 12</textarea></label></div></section><section class="panel"><div class="head"><h3>Sales Order Register</h3><span>Stock and account checks</span></div><table class="table"><thead><tr><th>Order</th><th>Customer</th><th>Stock</th><th>Account</th><th>Value</th><th>Status</th></tr></thead><tbody>' + orders.map(order => '<tr data-select="' + order.id + '"><td>' + order.id + '</td><td>' + order.customer + '</td><td>' + order.stock + '</td><td>' + order.account + '</td><td>$' + order.value.toLocaleString() + '</td><td><span class="pill ' + badge(order.status) + '">' + order.status + '</span></td></tr>').join('') + '</tbody></table></section>'; }
function warehouseView(){ const list = orders.filter(order => ['Order Approved','Picking','Ready'].includes(order.status)); return '<section class="panel"><div class="head"><div><h3>Electronic Picking List</h3><p class="subhead">Warehouse prepares approved orders and marks them ready for dispatch.</p></div><span>' + list.length + ' active</span></div>' + list.map(order => orderCard(order, true)).join('') + '</section><section class="panel"><div class="head"><h3>Preparation Checklist</h3><span>Current order: ' + current().id + '</span></div><div class="checklist"><div class="check"><div class="box">✓</div><div><b>Confirm order quantity</b><p class="subhead">Match picking list against sales order.</p></div></div><div class="check"><div class="box">✓</div><div><b>Pack and label goods</b><p class="subhead">Apply customer and delivery route labels.</p></div></div><div class="check"><div class="box">✓</div><div><b>Update ready status</b><p class="subhead">Notify dispatch automatically when goods are ready.</p></div></div></div></section>'; }
function dispatchView(){ const list = orders.filter(order => ['Ready','Scheduled','In Transit'].includes(order.status)); return '<section class="panel"><div class="head"><div><h3>Dispatch Planning Board</h3><p class="subhead">Review system recommendations before assigning drivers and vehicles.</p></div><span class="pill blue">Human approval required</span></div><div class="route-grid"><div class="map"><i class="pin a"></i><i class="pin b"></i></div><div class="module-card"><b>Recommended Plan</b><span>Route: Warehouse > Kings Road > Nausori</span><span>Vehicle: Truck 03, medium load</span><span>Driver: Ravi Singh, available now</span><button class="primary" id="approveBtn">Approve recommendation</button></div></div></section><section class="panel"><div class="head"><h3>Orders Ready for Dispatch</h3><span>' + list.length + ' records</span></div>' + list.map(order => orderCard(order, true)).join('') + '</section><section class="panel"><div class="head"><h3>Vehicle Capacity</h3><span>Fleet view</span></div><table class="table"><thead><tr><th>Vehicle</th><th>Capacity</th><th>Status</th><th>Assigned Driver</th></tr></thead><tbody><tr><td>Truck 03</td><td>Medium</td><td><span class="pill green">Available</span></td><td>Ravi Singh</td></tr><tr><td>Truck 04</td><td>Heavy</td><td><span class="pill blue">In Transit</span></td><td>Mere Tora</td></tr><tr><td>Truck 07</td><td>Medium</td><td><span class="pill blue">Scheduled</span></td><td>Anil Kumar</td></tr></tbody></table></section>'; }
function driverView(){ const list = orders.filter(order => order.driver !== 'Unassigned'); return '<section class="panel"><div class="head"><div><h3>Driver Mobile View</h3><p class="subhead">Drivers update progress, report delays, and capture proof of delivery.</p></div><span>' + list.length + ' assigned</span></div><div class="driver-screen"><div class="module-card"><b>Todays Schedule</b><span>' + list.length + ' deliveries assigned</span><span>Next stop: ' + (list[0] ? list[0].customer : 'No assignment') + '</span></div>' + list.map(order => '<div class="module-card" style="margin-top:10px"><b>' + order.id + ' · ' + order.customer + '</b><span>' + order.area + ' · ETA ' + order.eta + '</span><div class="actions"><button class="small" data-move="' + order.id + '">Update Status</button><button class="small" data-delay="' + order.id + '">Report Issue</button></div></div>').join('') + '</div></section><section class="panel"><div class="head"><h3>Proof of Delivery</h3><span>Digital signature</span></div><div class="signature">Customer signature area</div></section>'; }
function customerView(){ const order = current(); return '<section class="panel"><div class="head"><div><h3>Customer Tracking Portal</h3><p class="subhead">Customer can track status, ETA, notifications, and delivery confirmation.</p></div><span class="pill ' + badge(order.status) + '">' + order.status + '</span></div><div class="cards"><div class="module-card"><b>Estimated Arrival</b><strong>' + order.eta + '</strong><span>Latest delivery time based on driver update.</span></div><div class="module-card"><b>Notification Preference</b><strong>SMS + Email</strong><span>Customer receives automatic delivery updates.</span></div><div class="module-card"><b>Change Request</b><strong>Available before dispatch</strong><span>Customer can request revised delivery time before goods leave warehouse.</span></div></div></section><section class="panel"><div class="head"><h3>Delivery Timeline</h3><span>' + order.id + '</span></div><div class="timeline">' + flow.map(step => '<div class="event"><div class="dot"></div><div><b>' + step + '</b><p class="subhead">' + (flow.indexOf(step) <= flow.indexOf(order.status) ? 'Completed or current' : 'Pending update') + '</p></div></div>').join('') + '</div></section>'; }
function render(){ const active = orders.filter(order => order.status !== 'Delivered').length; $('nav').innerHTML = Object.keys(roles).map(key => '<button class="' + (activeRole === key ? 'active' : '') + '" data-role="' + key + '"><span>' + key.charAt(0).toUpperCase() + key.slice(1) + '</span><span>›</span></button>').join(''); $('pageTitle').textContent = roles[activeRole][0]; $('pageSub').textContent = roles[activeRole][1]; $('mTotal').textContent = orders.length + ' deliveries'; $('mOnTime').textContent = onTimeRate() + '%'; $('mActive').textContent = active; $('activeCount').textContent = active; $('mRating').textContent = ratingAvg() + '/5'; const views = {management:managementView, sales:salesView, warehouse:warehouseView, dispatch:dispatchView, driver:driverView, customer:customerView}; $('workspace').innerHTML = views[activeRole](); const order = current(); $('details').innerHTML = [['Order',order.id],['Customer',order.customer],['Route',order.route],['Driver and Vehicle',order.driver + ' · ' + order.vehicle],['Delivery Status',order.status + ' · ' + order.eta],['Issue',order.issue || 'No active issue'],['Proof of Delivery',order.signature]].map(row => '<div class="detail"><span>' + row[0] + '</span><strong>' + row[1] + '</strong></div>').join(''); }
document.addEventListener('click', event => { const roleBtn = event.target.closest('[data-role]'); const selectTarget = event.target.closest('[data-select]'); const moveBtn = event.target.closest('[data-move]'); const delayBtn = event.target.closest('[data-delay]'); if(roleBtn) setRole(roleBtn.dataset.role); if(selectTarget) selectOrder(selectTarget.dataset.select); if(moveBtn) move(moveBtn.dataset.move); if(delayBtn) delay(delayBtn.dataset.delay); if(event.target.id === 'resetBtn') resetData(); if(event.target.id === 'newBtn' || event.target.id === 'sampleOrderBtn') quickOrder(); if(event.target.id === 'notifyBtn') notifyCustomer(); if(event.target.id === 'approveBtn') move(current().id); });
render();
</script></body></html>
